<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RunAnywhere SDK Diagnostic</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        .log { margin: 5px 0; padding: 5px; border-left: 3px solid #00ff00; }
        .error { border-left-color: #ff0000; color: #ff0000; }
        .success { border-left-color: #00ff00; color: #00ff00; }
        .info { border-left-color: #ffff00; color: #ffff00; }
    </style>
</head>
<body>
    <h1>RunAnywhere SDK Diagnostic Test</h1>
    <div id="logs"></div>
    
    <script type="module">
        const logsDiv = document.getElementById('logs');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toISOString()}] ${msg}`;
            logsDiv.appendChild(div);
            console.log(msg);
        }
        
        async function runDiagnostics() {
            log('=== Starting Diagnostics ===', 'info');
            
            // Test 1: Check if files are accessible
            log('Test 1: Checking file accessibility...', 'info');
            try {
                const urls = [
                    '/assets/racommons-llamacpp.js',
                    '/assets/racommons-llamacpp.wasm',
                    '/assets/racommons-llamacpp-webgpu.js',
                    '/assets/racommons-llamacpp-webgpu.wasm',
                    '/assets/sherpa/sherpa-onnx-glue.js',
                    '/assets/sherpa/sherpa-onnx.wasm'
                ];
                
                for (const url of urls) {
                    const response = await fetch(url, { method: 'HEAD' });
                    if (response.ok) {
                        log(`✓ ${url} (${response.headers.get('content-length')} bytes)`, 'success');
                    } else {
                        log(`✗ ${url} (${response.status})`, 'error');
                    }
                }
            } catch (e) {
                log(`File check error: ${e.message}`, 'error');
            }
            
            // Test 2: Try dynamic import
            log('\nTest 2: Testing dynamic import...', 'info');
            try {
                const url = `${window.location.origin}/assets/racommons-llamacpp.js`;
                log(`Importing from: ${url}`, 'info');
                
                const module = await import(url);
                log(`✓ Module imported successfully`, 'success');
                log(`Module type: ${typeof module.default}`, 'info');
                
                if (typeof module.default === 'function') {
                    log('✓ Module exports a function', 'success');
                } else {
                    log('✗ Module does not export a function', 'error');
                }
            } catch (e) {
                log(`✗ Import failed: ${e.message}`, 'error');
                log(`Stack: ${e.stack}`, 'error');
            }
            
            // Test 3: Try to initialize WASM
            log('\nTest 3: Testing WASM instantiation...', 'info');
            try {
                const url = `${window.location.origin}/assets/racommons-llamacpp.js`;
                const module = await import(url);
                
                if (typeof module.default === 'function') {
                    log('Calling createModule function...', 'info');
                    
                    const wasmModule = await module.default({
                        print: (text) => log(`WASM OUTPUT: ${text}`, 'info'),
                        printErr: (text) => log(`WASM ERROR: ${text}`, 'error'),
                        locateFile: (path) => {
                            const fullPath = `${window.location.origin}/assets/${path}`;
                            log(`Locating: ${path} -> ${fullPath}`, 'info');
                            return fullPath;
                        }
                    });
                    
                    log('✓ WASM module instantiated!', 'success');
                    log(`Module object keys: ${Object.keys(wasmModule).slice(0, 10).join(', ')}...`, 'info');
                }
            } catch (e) {
                log(`✗ WASM instantiation failed: ${e.message}`, 'error');
                log(`Stack: ${e.stack}`, 'error');
            }
            
            log('\n=== Diagnostics Complete ===', 'info');
        }
        
        runDiagnostics().catch(e => log(`Fatal error: ${e.message}`, 'error'));
    </script>
</body>
</html>
